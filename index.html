<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Global Office World | Wholesale Cloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --primary: #000000;
            --accent: #2563eb;
            --bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #eef2f6;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.03);
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* ===== HEADER + BIG LOGO + TEXT ===== */
        header {
            background: white;
            padding: 0.8rem 5%;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 12px;
            flex-shrink: 0;
        }

        /* BIG LOGO */
        .logo-img {
            height: 70px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08));
        }

        .brand-text {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .nav-right {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn-nav {
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-admin {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-logout {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            display: none;
        }

        /* login overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        .login-card {
            background: white;
            padding: 32px 24px;
            border-radius: 28px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 40px rgba(0,0,0,0.2);
        }

        .login-input {
            padding: 14px;
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            margin-bottom: 18px;
            font-size: 1rem;
        }

        /* LAYOUT */
        .wrapper {
            display: flex;
            min-height: calc(100vh - 90px);
        }

        /* SIDEBAR: horizontal scroll on mobile */
        aside {
            width: 270px;
            background: #fefefe;
            padding: 2rem 1.2rem;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }

        .filter-title {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .cat-item {
            padding: 10px 16px;
            border-radius: 40px;
            margin-bottom: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
            white-space: nowrap;
        }

        .cat-item:hover, .cat-item.active {
            background: #f1f5f9;
            color: var(--accent);
            font-weight: 600;
        }

        /* main content */
        main {
            flex-grow: 1;
            padding: 2rem 4%;
            width: 100%;
            overflow-x: hidden;
        }

        .grid-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .grid-controls h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .search-bar {
            width: 100%;
            max-width: 340px;
            padding: 14px 24px;
            border-radius: 60px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 0.95rem;
            background: #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        /* PRODUCT GRID - BIGGER IMAGES & BETTER CARDS */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
        }

        .product-card {
            background: white;
            border-radius: 28px;
            border: 1px solid var(--border);
            transition: 0.25s ease;
            cursor: pointer;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 36px -14px rgba(0, 0, 0, 0.12);
        }

        /* LARGE PRODUCT IMAGE CONTAINER */
        .img-container {
            background-image: linear-gradient(rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92)), 
                              url('https://globalofficeworld.com/cdn/shop/collections/Global_Office_World_1200x1200.png?v=1757670343');
            background-size: 65px;
            background-repeat: repeat;
            background-position: center;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            border-bottom: 1px solid var(--border);
        }

        /* BIG PRODUCT IMAGE */
        .img-container img {
            max-width: 130%;
            max-height: 130%;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.1));
            transition: transform 0.2s;
        }

        .product-card:hover .img-container img {
            transform: scale(1.02);
        }

        .card-info {
            padding: 1.5rem;
        }

        .card-cat {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .card-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        /* MODAL - FULLY RESPONSIVE */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: none;
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            display: flex;
            min-height: 100%;
            width: 100%;
            position: relative;
            flex-direction: row;
        }

        .m-left {
            flex: 1.2;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(244, 241, 234, 0.85)), 
                              url('https://globalofficeworld.com/cdn/shop/collections/Global_Office_World_1200x1200.png?v=1757670343');
            background-size: 80px;
            background-repeat: repeat;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .main-display img {
            max-width: 100%;
            max-height: 60vh;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));
        }

        .gallery-thumbs {
            display: flex;
            gap: 14px;
            margin-top: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .thumb {
            width: 75px;
            height: 75px;
            border: 2px solid white;
            cursor: pointer;
            border-radius: 18px;
            overflow: hidden;
            background: white;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .thumb.active {
            border-color: var(--accent);
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .m-right {
            flex: 1;
            padding: 60px 7%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .close-btn {
            position: absolute;
            top: 28px;
            right: 32px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #1f2937;
            font-weight: 600;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            width: 48px;
            height: 48px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .m-title {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .m-desc {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .color-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .color-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #ddd;
        }

        .stock-pill {
            background: #f0fdf4;
            color: #166534;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 0.75rem;
        }

        .btn-wa-premium {
            background: #111;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 24px;
        }

        /* admin panel */
        .admin-card {
            background: white;
            padding: 28px 24px;
            border-radius: 28px;
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        input, select, textarea {
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            width: 100%;
            font-size: 0.9rem;
        }

        .variant-editor-row {
            display: grid;
            grid-template-columns: 1fr 100px 40px;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .btn-add-var {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .admin-item-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            padding: 16px;
            border-bottom: 1px solid #edf2f7;
        }

        .admin-item-row img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border-radius: 14px;
            background: #f9f9f9;
        }

        .hidden {
            display: none;
        }

        /* ===== RESPONSIVE BREAKPOINTS ===== */
        @media (max-width: 900px) {
            .logo-img {
                height: 55px;
            }
            .brand-text {
                font-size: 1.3rem;
            }
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 24px;
            }
            .img-container {
                height: 280px;
            }
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            aside {
                width: 100%;
                display: flex;
                overflow-x: auto;
                padding: 1rem;
                gap: 0.5rem;
                border-right: none;
                border-bottom: 1px solid var(--border);
                scrollbar-width: thin;
                white-space: nowrap;
            }
            .filter-title {
                display: none;
            }
            .cat-item {
                display: inline-block;
                margin-bottom: 0;
                white-space: nowrap;
            }
            .logo-img {
                height: 50px;
            }
            .brand-text {
                font-size: 1.2rem;
            }
            .grid-controls h1 {
                font-size: 1.6rem;
            }
            .img-container {
                height: 260px;
            }
            .card-name {
                font-size: 1rem;
            }
        }

        @media (max-width: 650px) {
            .modal-content {
                flex-direction: column;
            }
            .m-left, .m-right {
                width: 100%;
                padding: 2rem 1.2rem;
            }
            .m-left {
                min-height: 380px;
            }
            .m-title {
                font-size: 2rem;
            }
            .close-btn {
                top: 12px;
                right: 16px;
                background: white;
                width: 40px;
                height: 40px;
            }
            .product-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .img-container {
                height: 280px;
                padding: 20px;
            }
            .img-container img {
                max-width: 90%;
                max-height: 90%;
            }
            .card-info {
                padding: 1.2rem;
            }
            .variant-editor-row {
                grid-template-columns: 1fr 80px 35px;
            }
        }

        @media (max-width: 480px) {
            header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                padding: 0.8rem 4%;
            }
            .logo-container {
                justify-content: center;
            }
            .nav-right {
                justify-content: center;
            }
            .logo-img {
                height: 48px;
            }
            .brand-text {
                font-size: 1rem;
                white-space: normal;
            }
            .img-container {
                height: 240px;
            }
            .search-bar {
                max-width: 100%;
            }
            .admin-item-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn-nav {
                padding: 8px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom: 20px;">Admin Portal</h2>
        <input type="password" id="admin-pass-field" class="login-input" placeholder="Enter Security Password">
        <button class="btn-nav btn-admin" style="width: 100%; padding: 14px; border-radius: 50px;" onclick="validateLogin()">Login</button>
        <p style="margin-top: 18px; color: #aaa; cursor: pointer;" onclick="toggleLogin(false)">Cancel</p>
    </div>
</div>

<header>
    <div class="logo-container" onclick="location.reload()">
        <img src="image/Global_Office_World_1200x1200 (1).webp" alt="Global Office World" class="logo-img" onerror="this.src='https://placehold.co/400x200?text=GOW'">
        <span class="brand-text">Global Office World</span>
    </div>
    <div class="nav-right">
        <button class="btn-nav" onclick="showPage('store')">Collection</button>
        <button id="nav-admin-btn" class="btn-nav btn-admin" onclick="toggleLogin(true)">Admin Portal</button>
        <button id="nav-logout-btn" class="btn-nav btn-logout" onclick="logoutAdmin()">Logout</button>
    </div>
</header>

<div class="wrapper">
    <aside id="sidebar">
        <h3 class="filter-title">FILTER BY</h3>
        <div class="cat-item active" onclick="filterItems('All', this)">All Items</div>
        <div class="cat-item" onclick="filterItems('Executive Highback', this)">Executive Highback</div>
        <div class="cat-item" onclick="filterItems('Mesh Highback Chair', this)">Mesh Highback</div>
        <div class="cat-item" onclick="filterItems('Leatherite Highback Chair', this)">Leatherite Highback</div>
        <div class="cat-item" onclick="filterItems('Midback Chair', this)">Midback Chair</div>
        <div class="cat-item" onclick="filterItems('Visitor Chair', this)">Visitor Chair</div>
        <div class="cat-item" onclick="filterItems('Counter Stool', this)">Counter Stool</div>
        <div class="cat-item" onclick="filterItems('Seating Bench', this)">Seating Bench</div>
    </aside>

    <main>
        <div id="store-page">
            <div class="grid-controls">
                <h1>Catalog</h1>
                <input type="text" id="search" class="search-bar" placeholder="Search code or model..." oninput="renderStore()">
            </div>
            <div class="product-grid" id="product-grid"></div>
        </div>

        <div id="admin-page" class="hidden">
            <div class="admin-card">
                <h2 id="admin-title">Inventory Manager</h2><br>
                <form id="product-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-grid">
                        <div><label>Main Image</label><input type="file" id="img1" accept="image/*"></div>
                        <div><label>Gallery 2</label><input type="file" id="img2" accept="image/*"></div>
                        <div><label>Gallery 3</label><input type="file" id="img3" accept="image/*"></div>
                        <div><label>Model Name</label><input type="text" id="name" required></div>
                        <div><label>Model Code</label><input type="text" id="code" required></div>
                        <div>
                            <label>Category</label>
                            <select id="cat">
                                <option>Executive Highback</option>
                                <option>Mesh Highback Chair</option>
                                <option>Leatherite Highback Chair</option>
                                <option>Midback Chair</option>
                                <option>Visitor Chair</option>
                                <option>Counter Stool</option>
                                <option>Seating Bench</option>
                            </select>
                        </div>
                        <div class="full">
                            <label>Color Options & Stock</label>
                            <div id="variant-list-admin"></div>
                            <button type="button" class="btn-add-var" onclick="addVariantRow()">+ Add Color Variant</button>
                        </div>
                        <div class="full"><label>Description</label><textarea id="desc" rows="2"></textarea></div>
                    </div>
                    <button type="submit" class="btn-nav btn-admin" style="width: 100%; margin-top: 24px; padding: 16px; border-radius: 50px;">SAVE TO CLOUD</button>
                    <button type="button" id="cancel-btn" class="hidden" onclick="resetForm()" style="width: 100%; margin-top: 12px; cursor: pointer;">Cancel Edit</button>
                </form>
            </div>
            <div class="admin-card">
                <h3>Active Inventory</h3><br>
                <div id="admin-list"></div>
            </div>
        </div>
    </main>
</div>

<div class="modal" id="pModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div class="m-left">
            <div class="main-display"><img id="modalMainImg" src=""></div>
            <div class="gallery-thumbs" id="modalThumbs"></div>
        </div>
        <div class="m-right">
            <p id="modalRefCode" style="color:var(--accent); font-weight:800; font-size:0.75rem; letter-spacing:1px; margin-bottom:10px;"></p>
            <h1 class="m-title" id="modalTitle"></h1>
            <p class="m-desc" id="modalDesc"></p>
            <div class="variant-display-grid">
                <label style="margin-bottom:14px; display:block;">Available Finishes</label>
                <div id="modal-variant-rows"></div>
            </div>
            <button class="btn-wa-premium" onclick="whatsappContact()">Inquire via WhatsApp</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://uijuhqcgcukskvgoicgs.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NIpA7JniaOYXFqD_MFaJHQ_ICLldPRB';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;
    let currentCategory = "All";
    let allProducts = [];

    async function init() {
        await fetchProducts();
        renderStore();
    }

    async function fetchProducts() {
        try {
            const { data, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            allProducts = data || [];
        } catch (e) {
            console.error("Fetch error:", e.message);
        }
    }

    function toggleLogin(show) {
        if (isAdmin && show) { showPage('admin'); return; }
        document.getElementById('login-overlay').style.display = show ? 'flex' : 'none';
    }

    function validateLogin() {
        if (document.getElementById('admin-pass-field').value === "uzainali1122@") {
            isAdmin = true;
            document.getElementById('nav-admin-btn').style.display = 'none';
            document.getElementById('nav-logout-btn').style.display = 'block';
            toggleLogin(false);
            showPage('admin');
            renderAdminList();
        } else { alert("Incorrect Password"); }
    }

    function logoutAdmin() {
        isAdmin = false;
        document.getElementById('nav-admin-btn').style.display = 'block';
        document.getElementById('nav-logout-btn').style.display = 'none';
        showPage('store');
    }

    async function uploadToBucket(file) {
        if (!file) return null;
        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}.${fileExt}`;
        const filePath = `items/${fileName}`;
        const { data, error } = await _supabase.storage.from('product-images').upload(filePath, file);
        if (error) { console.error("Upload Error:", error); return null; }
        const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(filePath);
        return urlData.publicUrl;
    }

    function addVariantRow(color = "", qty = "") {
        const container = document.getElementById('variant-list-admin');
        const div = document.createElement('div');
        div.className = 'variant-editor-row';
        div.innerHTML = `
            <input type="text" placeholder="Color name" value="${color}" class="v-color" required>
            <input type="number" placeholder="Qty" value="${qty}" class="v-qty" required>
            <button type="button" onclick="this.parentElement.remove()" style="background:none; border:none; font-size:1.3rem; cursor:pointer;">✕</button>
        `;
        container.appendChild(div);
    }

    document.getElementById('product-form').onsubmit = async (e) => {
        e.preventDefault();
        const saveBtn = e.target.querySelector('button[type="submit"]');
        saveBtn.innerText = "UPLOADING...";
        saveBtn.disabled = true;

        const id = document.getElementById('edit-id').value;
        const variants = [];
        document.querySelectorAll('.variant-editor-row').forEach(row => {
            const c = row.querySelector('.v-color')?.value;
            const q = row.querySelector('.v-qty')?.value;
            if (c && q) variants.push({ color: c, qty: parseInt(q) || 0 });
        });

        let productData = {
            name: document.getElementById('name').value,
            code: document.getElementById('code').value,
            cat: document.getElementById('cat').value,
            description: document.getElementById('desc').value,
            variants: variants
        };

        const f1 = document.getElementById('img1').files[0];
        const f2 = document.getElementById('img2').files[0];
        const f3 = document.getElementById('img3').files[0];

        if (f1) productData.img1 = await uploadToBucket(f1);
        if (f2) productData.img2 = await uploadToBucket(f2);
        if (f3) productData.img3 = await uploadToBucket(f3);

        try {
            if (id) {
                await _supabase.from('products').update(productData).eq('id', id);
            } else {
                await _supabase.from('products').insert([productData]);
            }
            alert("Successfully Saved!");
            await fetchProducts();
            resetForm();
            renderAdminList();
            renderStore();
        } catch (err) { alert("Save failed: " + err.message); }
        finally { saveBtn.innerText = "SAVE TO CLOUD"; saveBtn.disabled = false; }
    };

    function renderStore() {
        const grid = document.getElementById('product-grid');
        const q = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";
        allProducts.forEach(p => {
            const matchesSearch = (p.code?.toLowerCase() || '').includes(q) || (p.name?.toLowerCase() || '').includes(q);
            const matchesCat = (currentCategory === "All" || p.cat === currentCategory);
            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <div class="product-card" onclick="openModal(${p.id})">
                        <div class="img-container"><img src="${p.img1 || ''}" alt="${p.name}" onerror="this.src='https://placehold.co/500x400?text=Product'"></div>
                        <div class="card-info">
                            <p class="card-cat">${p.cat || ''}</p>
                            <p class="card-name">${p.name || ''}</p>
                            <p style="font-size:0.75rem; color:#999">CODE: ${p.code || ''}</p>
                        </div>
                    </div>`;
            }
        });
        if(grid.innerHTML === "") grid.innerHTML = "<div style='text-align:center; padding: 60px;'>No products found.</div>";
    }

    function renderAdminList() {
        const list = document.getElementById('admin-list');
        list.innerHTML = "";
        allProducts.forEach(p => {
            list.innerHTML += `
                <div class="admin-item-row">
                    <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
                        <img src="${p.img1 || ''}" onerror="this.src='https://placehold.co/80x80'">
                        <span><strong>${p.code}</strong> - ${p.name}</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-nav" onclick="editProduct(${p.id})">Edit</button>
                        <button class="btn-nav" style="color:red" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>`;
        });
    }

    function editProduct(id) {
        const p = allProducts.find(item => item.id === id);
        if (!p) return;
        document.getElementById('edit-id').value = p.id;
        document.getElementById('name').value = p.name || "";
        document.getElementById('code').value = p.code || "";
        document.getElementById('cat').value = p.cat || "";
        document.getElementById('desc').value = p.description || "";
        document.getElementById('variant-list-admin').innerHTML = "";
        if (p.variants && p.variants.length) p.variants.forEach(v => addVariantRow(v.color, v.qty));
        document.getElementById('admin-title').innerText = "Editing " + p.code;
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    async function deleteProduct(id) {
        if (confirm("Permanently delete this item?")) {
            const { error } = await _supabase.from('products').delete().eq('id', id);
            if (!error) { await fetchProducts(); renderAdminList(); renderStore(); }
        }
    }

    function openModal(id) {
        const p = allProducts.find(item => item.id === id);
        if (!p) return;
        document.getElementById('modalMainImg').src = p.img1 || '';
        document.getElementById('modalTitle').innerText = p.name || '';
        document.getElementById('modalRefCode').innerText = "REF: " + (p.code || '');
        document.getElementById('modalDesc').innerText = p.description || "Premium wholesale quality — contact for bulk orders.";
        const variantBox = document.getElementById('modal-variant-rows');
        variantBox.innerHTML = "";
        if (p.variants && p.variants.length) {
            p.variants.forEach(v => {
                variantBox.innerHTML += `
                    <div class="color-row">
                        <div class="color-name"><div class="color-dot" style="background:${v.color.toLowerCase()}"></div>${v.color}</div>
                        <div class="stock-pill">${v.qty} Units Ready</div>
                    </div>`;
            });
        } else { variantBox.innerHTML = '<p>Contact for color options</p>'; }
        const thumbs = document.getElementById('modalThumbs');
        thumbs.innerHTML = `<div class="thumb active" onclick="swapMain('${p.img1 || ''}', this)"><img src="${p.img1 || ''}"></div>`;
        if (p.img2) thumbs.innerHTML += `<div class="thumb" onclick="swapMain('${p.img2}', this)"><img src="${p.img2}"></div>`;
        if (p.img3) thumbs.innerHTML += `<div class="thumb" onclick="swapMain('${p.img3}', this)"><img src="${p.img3}"></div>`;
        document.getElementById('pModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function resetForm() {
        document.getElementById('product-form').reset();
        document.getElementById('variant-list-admin').innerHTML = "";
        document.getElementById('edit-id').value = "";
        document.getElementById('admin-title').innerText = "Inventory Manager";
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    function showPage(page) {
        document.getElementById('store-page').classList.toggle('hidden', page !== 'store');
        document.getElementById('sidebar').classList.toggle('hidden', page !== 'store');
        document.getElementById('admin-page').classList.toggle('hidden', page !== 'admin');
        if (page === 'admin') renderAdminList();
    }

    function filterItems(cat, el) {
        currentCategory = cat;
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderStore();
    }

    function swapMain(src, el) {
        document.getElementById('modalMainImg').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function closeModal() { document.getElementById('pModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function whatsappContact() {
        const name = document.getElementById('modalTitle').innerText;
        const code = document.getElementById('modalRefCode').innerText;
        const msg = encodeURIComponent(`*Wholesale Inquiry*\n*Model:* ${name}\n${code}`);
        window.open(`https://wa.me/923320344696?text=${msg}`);
    }

    init();
</script>
</body>
</html>
