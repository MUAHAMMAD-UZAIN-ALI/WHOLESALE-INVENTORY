<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Office World | Wholesale Cloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #000000; --accent: #2563eb; --bg: #ffffff; --amy-beige: #f4f1ea; --text-main: #111827; --text-muted: #6b7280; --border: #eeeeee; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; }
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo-box { background: black; color: white; padding: 4px 12px; font-weight: 800; font-size: 1.2rem; border-radius: 2px; cursor: pointer; text-transform: uppercase; }
        .nav-right { display: flex; gap: 10px; }
        .btn-nav { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.2s; }
        .btn-admin { background: var(--primary); color: white; border: none; }
        .btn-logout { background: #fee2e2; color: #dc2626; border: none; display: none; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .login-input { padding: 15px; width: 100%; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 1rem; }
        .wrapper { display: flex; min-height: calc(100vh - 70px); }
        aside { width: 280px; background: #fdfdfd; padding: 2.5rem 1.5rem; border-right: 1px solid var(--border); flex-shrink: 0; }
        .filter-title { font-weight: 700; text-transform: uppercase; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1.5rem; letter-spacing: 1.5px; }
        .cat-item { padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 0.9rem; }
        .cat-item:hover, .cat-item.active { background: #f1f5f9; color: var(--accent); font-weight: 600; }
        main { flex-grow: 1; padding: 2.5rem 4%; width: 100%; }
        .grid-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 20px; }
        .search-bar { width: 100%; max-width: 350px; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); outline: none; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        .product-card { background: white; border-radius: 16px; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); }
        .img-container { background: #f8fafc; height: 320px; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 20px; }
        .card-cat { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
        .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 2000; overflow-y: auto; }
        .modal-content { display: flex; min-height: 100vh; width: 100%; position: relative; }
        .m-left { flex: 1.2; background: var(--amy-beige); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; }
        .main-display img { max-width: 90%; max-height: 70vh; object-fit: contain; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.1)); }
        .gallery-thumbs { display: flex; gap: 15px; margin-top: 30px; }
        .thumb { width: 80px; height: 80px; border: 2px solid white; cursor: pointer; border-radius: 10px; overflow: hidden; background: white; }
        .thumb.active { border-color: var(--accent); }
        .thumb img { width: 100%; height: 100%; object-fit: contain; }
        .m-right { flex: 1; padding: 80px 8%; display: flex; flex-direction: column; justify-content: center; }
        .close-btn { position: absolute; top: 40px; right: 50px; font-size: 1.4rem; cursor: pointer; color: #999; font-weight: 800; }
        .m-title { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 25px; letter-spacing: -2px; }
        .m-desc { color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 40px; }
        .variant-display-grid { border-top: 1px solid #eee; padding-top: 30px; margin-bottom: 40px; }
        .color-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .color-name { font-weight: 700; display: flex; align-items: center; gap: 10px; text-transform: uppercase; font-size: 0.9rem; }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #ddd; }
        .stock-pill { background: #f0fdf4; color: #166534; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; }
        .btn-wa-premium { background: #111; color: white; padding: 22px; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .admin-card { background: white; padding: 35px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .full { grid-column: span 3; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 0.95rem; }
        .variant-editor-row { display: grid; grid-template-columns: 1fr 120px 50px; gap: 10px; margin-bottom: 10px; }
        .btn-add-var { background: #f1f5f9; border: 1px dashed #cbd5e1; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 10px; }
        .admin-item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .admin-item-row img { width: 50px; height: 50px; object-fit: contain; background: #f9f9f9; border-radius: 5px; }
        .hidden { display: none; }
        @media (max-width: 1000px) { .wrapper { flex-direction: column; } aside { width: 100%; display: flex; overflow-x: auto; padding: 10px; border-right: none; border-bottom: 1px solid var(--border); } .modal-content { flex-direction: column; } .m-left, .m-right { width: 100%; padding: 40px 5%; } .m-title { font-size: 2.5rem; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>Admin Portal</h2>
        <input type="password" id="admin-pass-field" class="login-input" placeholder="Enter Security Password">
        <button class="btn-nav btn-admin" style="width: 100%; padding: 15px;" onclick="validateLogin()">Login</button>
        <p style="margin-top: 15px; color: #999; cursor: pointer;" onclick="toggleLogin(false)">Cancel</p>
    </div>
</div>

<header>
    <div class="logo-box" onclick="location.reload()">GLOBAL OFFICE WORLD</div>
    <div class="nav-right">
        <button class="btn-nav" onclick="showPage('store')">Collection</button>
        <button id="nav-admin-btn" class="btn-nav btn-admin" onclick="toggleLogin(true)">Admin Portal</button>
        <button id="nav-logout-btn" class="btn-nav btn-logout" onclick="logoutAdmin()">Logout</button>
    </div>
</header>

<div class="wrapper">
    <aside id="sidebar">
        <h3 class="filter-title">Filter by</h3>
        <div class="cat-item active" onclick="filterItems('All', this)">All Items</div>
        <div class="cat-item" onclick="filterItems('Executive Highback', this)">Executive Highback</div>
        <div class="cat-item" onclick="filterItems('Mesh Highback Chair', this)">Mesh Highback Chair</div>
        <div class="cat-item" onclick="filterItems('Leatherite Highback Chair', this)">Leatherite Highback</div>
        <div class="cat-item" onclick="filterItems('Midback Chair', this)">Midback Chair</div>
        <div class="cat-item" onclick="filterItems('Visitor Chair', this)">Visitor Chair</div>
        <div class="cat-item" onclick="filterItems('Counter Stool', this)">Counter Stool</div>
        <div class="cat-item" onclick="filterItems('Seating Bench', this)">Seating Bench</div>
    </aside>

    <main>
        <div id="store-page">
            <div class="grid-controls">
                <h1 style="font-size: 2rem; font-weight: 800;">Catalog</h1>
                <input type="text" id="search" class="search-bar" placeholder="Search code or model..." oninput="renderStore()">
            </div>
            <div class="product-grid" id="product-grid"></div>
        </div>

        <div id="admin-page" class="hidden">
            <div class="admin-card">
                <h2 id="admin-title">Inventory Manager</h2><br>
                <form id="product-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-grid">
                        <div><label>Main Image</label><input type="file" id="img1" accept="image/*"></div>
                        <div><label>Gallery 2</label><input type="file" id="img2" accept="image/*"></div>
                        <div><label>Gallery 3</label><input type="file" id="img3" accept="image/*"></div>
                        <div><label>Model Name</label><input type="text" id="name" required></div>
                        <div><label>Model Code</label><input type="text" id="code" required></div>
                        <div>
                            <label>Category</label>
                            <select id="cat">
                                <option>Executive Highback</option>
                                <option>Mesh Highback Chair</option>
                                <option>Leatherite Highback Chair</option>
                                <option>Midback Chair</option>
                                <option>Visitor Chair</option>
                                <option>Counter Stool</option>
                                <option>Seating Bench</option>
                            </select>
                        </div>
                        <div class="full">
                            <label>Color Options & Stock Quantities</label>
                            <div id="variant-list-admin"></div>
                            <button type="button" class="btn-add-var" onclick="addVariantRow()">+ Add Color Variant</button>
                        </div>
                        <div class="full"><label>Description</label><textarea id="desc" rows="2"></textarea></div>
                    </div>
                    <button type="submit" class="btn-nav btn-admin" style="width: 100%; margin-top: 20px; padding: 18px;">SAVE TO CLOUD</button>
                    <button type="button" id="cancel-btn" class="hidden" onclick="resetForm()" style="width: 100%; margin-top: 10px; cursor: pointer;">Cancel Edit</button>
                </form>
            </div>
            <div class="admin-card">
                <h3>Active Inventory</h3><br>
                <div id="admin-list"></div>
            </div>
        </div>
    </main>
</div>

<div class="modal" id="pModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div class="m-left">
            <div class="main-display"><img id="modalMainImg" src=""></div>
            <div class="gallery-thumbs" id="modalThumbs"></div>
        </div>
        <div class="m-right">
            <p id="modalRefCode" style="color:var(--accent); font-weight:800; font-size:0.8rem; margin-bottom:10px;"></p>
            <h1 class="m-title" id="modalTitle"></h1>
            <p class="m-desc" id="modalDesc"></p>
            <div class="variant-display-grid">
                <label style="margin-bottom:15px; display:block;">Available Finishes</label>
                <div id="modal-variant-rows"></div>
            </div>
            <button class="btn-wa-premium" onclick="whatsappContact()">Inquire via WhatsApp</button>
        </div>
    </div>
</div>

<script>
    // --- STEP 1: CONFIGURATION ---
    const SUPABASE_URL = 'https://uijuhqcgcukskvgoicgs.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NIpA7JniaOYXFqD_MFaJHQ_ICLldPRB'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;
    let currentCategory = "All";
    let allProducts = [];

    // --- STEP 2: INITIALIZATION ---
    async function init() {
        await fetchProducts();
        renderStore();
    }

    async function fetchProducts() {
        try {
            const { data, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            allProducts = data || [];
        } catch (e) {
            console.error("Fetch error:", e.message);
        }
    }

    // --- STEP 3: LOGIN LOGIC ---
    function toggleLogin(show) {
        if(isAdmin && show) { showPage('admin'); return; }
        document.getElementById('login-overlay').style.display = show ? 'flex' : 'none';
    }

    function validateLogin() {
        if(document.getElementById('admin-pass-field').value === "uzainali1122@") {
            isAdmin = true;
            document.getElementById('nav-admin-btn').style.display = 'none';
            document.getElementById('nav-logout-btn').style.display = 'block';
            toggleLogin(false);
            showPage('admin');
            renderAdminList();
        } else { alert("Incorrect Password"); }
    }

    function logoutAdmin() {
        isAdmin = false;
        document.getElementById('nav-admin-btn').style.display = 'block';
        document.getElementById('nav-logout-btn').style.display = 'none';
        showPage('store');
    }

    // --- STEP 4: PRODUCT MANAGEMENT ---
    function addVariantRow(color = "", qty = "") {
        const container = document.getElementById('variant-list-admin');
        const div = document.createElement('div');
        div.className = 'variant-editor-row';
        div.innerHTML = `
            <input type="text" placeholder="Color" value="${color}" class="v-color" required>
            <input type="number" placeholder="Qty" value="${qty}" class="v-qty" required>
            <button type="button" onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-weight:800;">✕</button>
        `;
        container.appendChild(div);
    }

    async function toBase64(file) {
        if(!file) return null;
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    document.getElementById('product-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        
        // 1. Collect variants
        const variants = [];
        document.querySelectorAll('.variant-editor-row').forEach(row => {
            const c = row.querySelector('.v-color').value;
            const q = row.querySelector('.v-qty').value;
            if(c && q) variants.push({ color: c, qty: q });
        });

        // 2. Prepare basic data
        let productData = {
            name: document.getElementById('name').value,
            code: document.getElementById('code').value,
            cat: document.getElementById('cat').value,
            description: document.getElementById('desc').value,
            variants: variants
        };

        // 3. Handle Images
        const f1 = document.getElementById('img1').files[0];
        const f2 = document.getElementById('img2').files[0];
        const f3 = document.getElementById('img3').files[0];

        if (f1) productData.img1 = await toBase64(f1);
        if (f2) productData.img2 = await toBase64(f2);
        if (f3) productData.img3 = await toBase64(f3);

        // 4. Send to Cloud
        try {
            if (id) {
                const { error } = await _supabase.from('products').update(productData).eq('id', id);
                if (error) throw error;
            } else {
                const { error } = await _supabase.from('products').insert([productData]);
                if (error) throw error;
            }

            alert("Successfully Saved to Cloud!");
            await fetchProducts();
            resetForm();
            renderAdminList();
            renderStore();
        } catch (err) {
            console.error("Database Error:", err);
            alert("Save failed: " + err.message);
        }
    };

    // --- STEP 5: RENDERING LOGIC ---
    function renderStore() {
        const grid = document.getElementById('product-grid');
        const q = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";
        
        allProducts.forEach(p => {
            const matchesSearch = p.code.toLowerCase().includes(q) || p.name.toLowerCase().includes(q);
            const matchesCat = (currentCategory === "All" || p.cat === currentCategory);

            if(matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <div class="product-card" onclick="openModal(${p.id})">
                        <div class="img-container"><img src="${p.img1 || ''}" alt="${p.name}"></div>
                        <div class="card-info">
                            <p class="card-cat">${p.cat}</p>
                            <p class="card-name">${p.name}</p>
                            <p style="font-size:0.8rem; color:#999">CODE: ${p.code}</p>
                        </div>
                    </div>`;
            }
        });
    }

    function renderAdminList() {
        const list = document.getElementById('admin-list');
        list.innerHTML = "";
        allProducts.forEach(p => {
            list.innerHTML += `
                <div class="admin-item-row">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <img src="${p.img1 || ''}">
                        <span><strong>${p.code}</strong> - ${p.name}</span>
                    </div>
                    <div>
                        <button class="btn-nav" onclick="editProduct(${p.id})">Edit</button>
                        <button class="btn-nav" style="color:red" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>`;
        });
    }

    // --- STEP 6: UTILS ---
    function editProduct(id) {
        const p = allProducts.find(item => item.id === id);
        if(!p) return;
        document.getElementById('edit-id').value = p.id;
        document.getElementById('name').value = p.name;
        document.getElementById('code').value = p.code;
        document.getElementById('cat').value = p.cat;
        document.getElementById('desc').value = p.description || "";
        document.getElementById('variant-list-admin').innerHTML = "";
        if(p.variants) p.variants.forEach(v => addVariantRow(v.color, v.qty));
        document.getElementById('admin-title').innerText = "Editing " + p.code;
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function deleteProduct(id) {
        if(confirm("Permanently delete this item from Cloud?")) {
            const { error } = await _supabase.from('products').delete().eq('id', id);
            if(!error) {
                await fetchProducts();
                renderAdminList();
                renderStore();
            } else {
                alert("Delete failed: " + error.message);
            }
        }
    }

    function openModal(id) {
        const p = allProducts.find(item => item.id === id);
        if (!p) return;
        document.getElementById('modalMainImg').src = p.img1 || '';
        document.getElementById('modalTitle').innerText = p.name;
        document.getElementById('modalRefCode').innerText = "REFERENCE: " + p.code;
        document.getElementById('modalDesc').innerText = p.description || "Premium wholesale quality seating solution.";
        
        const variantBox = document.getElementById('modal-variant-rows');
        variantBox.innerHTML = "";
        if(p.variants) {
            p.variants.forEach(v => {
                variantBox.innerHTML += `
                    <div class="color-row">
                        <div class="color-name">
                            <div class="color-dot" style="background:${v.color.toLowerCase()}"></div>
                            ${v.color}
                        </div>
                        <div class="stock-pill">${v.qty} Units Ready</div>
                    </div>`;
            });
        }

        const thumbs = document.getElementById('modalThumbs');
        thumbs.innerHTML = `<div class="thumb active" onclick="swapMain('${p.img1}', this)"><img src="${p.img1}"></div>`;
        if(p.img2) thumbs.innerHTML += `<div class="thumb" onclick="swapMain('${p.img2}', this)"><img src="${p.img2}"></div>`;
        if(p.img3) thumbs.innerHTML += `<div class="thumb" onclick="swapMain('${p.img3}', this)"><img src="${p.img3}"></div>`;

        document.getElementById('pModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function resetForm() {
        document.getElementById('product-form').reset();
        document.getElementById('variant-list-admin').innerHTML = "";
        document.getElementById('edit-id').value = "";
        document.getElementById('cancel-btn').classList.add('hidden');
        document.getElementById('admin-title').innerText = "Inventory Manager";
    }

    function showPage(p) {
        document.getElementById('store-page').classList.toggle('hidden', p !== 'store');
        document.getElementById('sidebar').classList.toggle('hidden', p !== 'store');
        document.getElementById('admin-page').classList.toggle('hidden', p !== 'admin');
    }

    function filterItems(cat, el) {
        currentCategory = cat;
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderStore();
    }

    function swapMain(src, el) {
        document.getElementById('modalMainImg').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function closeModal() { document.getElementById('pModal').style.display='none'; document.body.style.overflow='auto'; }

    function whatsappContact() {
        const name = document.getElementById('modalTitle').innerText;
        const code = document.getElementById('modalRefCode').innerText;
        const msg = encodeURIComponent(`*GOW Wholesale Inquiry*\n*Model:* ${name}\n*${code}*\n\nPlease share wholesale price list.`);
        window.open(`https://wa.me/923224164103?text=${msg}`);
    }

    init();
</script>
</body>
</html>
